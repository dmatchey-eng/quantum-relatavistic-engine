name: Mathematical Verification & Code Linting

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  validate-and-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Test across multiple Python versions to guarantee runtime stability
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Initialize Python ${{ matrix: 3.11 }} Environment
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip' # Automatically caches dependencies for faster subsequent runs

      - name: Install Core Dependencies
        run: |
          python -m pip install --upgrade pip
          # Install testing suite (pytest), linting tool (flake8), and numerical math backend (numpy)
          pip install pytest flake8 numpy

      - name: Execute Code Linting & Style Enforcement
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. E501 enforces standard line length limits.
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Core Physics Engine Unit Tests
        env:
          # Forces the runner to treat the repository root as a source path
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest -v
